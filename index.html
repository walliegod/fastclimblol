<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glitched Writer</title>
  
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css?family=Roboto+Mono:100" rel="stylesheet">
  
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Roboto Mono', monospace;
      background: #212121;
      height: 100%;
    }
    
    .container {
      height: 100vh;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .text {
      font-weight: 100;
      font-size: 28px;
      color: #FAFAFA;
      text-align: center;
      padding: 0 20px;
      max-width: 800px;
      line-height: 1.4;
    }
    
    .gw-glitched {
      color: #757575;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="text"></div>
  </div>

  <script type="module">
    import {
      presets,
      queueWrite
    } from "https://esm.sh/glitched-writer@2.0.29";

    const phrases = [
      "Hi",
      "welcome to",
      "fastclimb.lol",
      "stay tuned"
    ];

    queueWrite(
      phrases,
      ".text",
      {
        ...presets.neo,
        letterize: true
      },
      800,
      true
    );
  </script>
</body>
</html>
